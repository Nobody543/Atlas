<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Today — The Atlas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink:#1a1814; --ink-light:#3d3830; --muted:#7a7165; --faint:#c8bfb0;
  --paper:#f5f0e8; --paper-warm:#ede6d6; --paper-dark:#ddd3c0; --cream:#faf7f2;
  --moss:#3d5a3e; --moss-light:#5a7a5b; --moss-pale:#c8d9c8;
  --rust:#8b3a2a; --rust-light:#b85a40; --rust-pale:#e8c8bc;
  --amber:#7a5a1a; --amber-pale:#e8d8a8;
  --font-display:'Playfair Display',Georgia,serif;
  --font-body:'DM Sans',system-ui,sans-serif;
  --tr:0.25s cubic-bezier(0.4,0,0.2,1);
  --pad:clamp(1rem,4vw,2.5rem);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html{scroll-behavior:smooth;}
body{background:var(--cream);color:var(--ink);font-family:var(--font-body);font-weight:300;min-height:100vh;min-height:-webkit-fill-available;}

.site-nav{background:var(--ink);color:var(--paper);padding:calc(0.9rem + var(--safe-top)) var(--pad) 0.9rem;display:flex;align-items:center;gap:0.6rem;position:sticky;top:0;z-index:100;overflow-x:auto;scrollbar-width:none;}
.site-nav::-webkit-scrollbar{display:none;}
.nav-brand{font-family:var(--font-display);font-size:1.1rem;font-weight:400;white-space:nowrap;margin-right:0.4rem;flex-shrink:0;}
.nav-sep{color:rgba(255,255,255,0.15);flex-shrink:0;}
.nav-link{background:none;border:none;color:rgba(255,255,255,0.5);font-family:var(--font-body);font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.4rem 0.7rem;border-radius:2rem;cursor:pointer;transition:var(--tr);white-space:nowrap;text-decoration:none;font-weight:400;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.nav-link:hover,.nav-link.active{color:var(--paper);background:rgba(255,255,255,0.15);}

.page-wrap{padding:2.5rem var(--pad);padding-bottom:calc(2.5rem + var(--safe-bottom));max-width:760px;}
.page-title{font-family:var(--font-display);font-size:clamp(2rem,6vw,3rem);font-weight:400;line-height:1.1;margin-bottom:0.3rem;}
.page-title em{font-style:italic;color:var(--muted);}
.page-sub{font-size:0.75rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:2rem;font-weight:400;}

.section-tabs{display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.section-tab{background:none;border:1px solid var(--paper-dark);color:var(--muted);font-family:var(--font-body);font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;padding:0.45rem 1rem;border-radius:2rem;cursor:pointer;transition:var(--tr);font-weight:400;-webkit-tap-highlight-color:transparent;}
.section-tab.active{background:var(--ink);border-color:var(--ink);color:var(--paper);}
.section-panel{display:none;}
.section-panel.active{display:block;}

.card{background:var(--paper);border:1px solid var(--paper-dark);border-radius:6px;margin-bottom:1.2rem;overflow:hidden;}
.card-header{padding:1rem 1.4rem;border-bottom:1px solid var(--paper-dark);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:0.68rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);font-weight:500;}
.card-accent{width:20px;height:3px;border-radius:2px;}
.card-accent.moss{background:var(--moss-light);}
.card-accent.rust{background:var(--rust-light);}
.card-accent.amber{background:var(--amber);}
.card-body{padding:1.2rem 1.4rem;}

/* Goal rows */
.goal-item{display:flex;align-items:center;gap:0.8rem;padding:0.85rem 0;border-bottom:1px solid var(--paper-dark);}
.goal-item:last-child{border-bottom:none;padding-bottom:0;}
.goal-item:first-child{padding-top:0;}
.goal-text{flex:1;font-size:0.9rem;color:var(--ink-light);line-height:1.4;}
.goal-item.completed .goal-text{text-decoration:line-through;color:var(--moss-light);}
.goal-item.failed .goal-text{text-decoration:line-through;color:var(--rust-light);}
.status-btns{display:flex;gap:0.3rem;align-items:center;flex-shrink:0;}
.status-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--paper-dark);background:var(--cream);font-size:0.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr);-webkit-tap-highlight-color:transparent;}
.status-btn:hover{border-color:var(--muted);}
.status-btn.s-done{background:var(--moss-pale);border-color:var(--moss-light);color:var(--moss);}
.status-btn.s-fail{background:var(--rust-pale);border-color:var(--rust-light);color:var(--rust);}
.del-btn{background:none;border:none;color:var(--faint);font-size:0.8rem;cursor:pointer;padding:0.2rem;transition:color 0.2s;min-width:28px;min-height:28px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
.del-btn:hover{color:var(--rust);}
.reg-tag{display:inline-block;font-size:0.6rem;letter-spacing:0.07em;text-transform:uppercase;padding:0.12rem 0.45rem;border-radius:2rem;background:var(--amber-pale);color:var(--amber);font-weight:500;margin-right:0.4rem;vertical-align:middle;}
.tmr-tag{display:inline-block;font-size:0.6rem;letter-spacing:0.07em;text-transform:uppercase;padding:0.12rem 0.45rem;border-radius:2rem;background:var(--paper-dark);color:var(--muted);font-weight:500;margin-right:0.4rem;vertical-align:middle;}

/* Add inputs */
.add-row{display:flex;gap:0.6rem;margin-top:1rem;}
.add-input{flex:1;background:var(--cream);border:1px solid var(--paper-dark);border-radius:4px;font-family:var(--font-body);font-size:0.88rem;color:var(--ink);padding:0.7rem 0.9rem;outline:none;transition:border-color 0.2s;min-height:44px;-webkit-appearance:none;}
.add-input:focus{border-color:var(--moss-light);}
.add-btn{background:var(--ink);color:var(--paper);border:none;border-radius:4px;padding:0.7rem 1.2rem;font-family:var(--font-body);font-size:0.82rem;cursor:pointer;transition:var(--tr);min-height:44px;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.add-btn:hover{background:var(--moss);}
.add-btn.rust-btn{background:var(--rust-light);}
.add-btn.rust-btn:hover{background:var(--rust);}

/* Regular task form */
.task-form-inner{background:var(--cream);border:1px solid var(--paper-dark);border-radius:4px;padding:1rem;margin-bottom:1rem;}
.form-label{font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:0.5rem;font-weight:400;}
.full-input{width:100%;background:var(--paper);border:1px solid var(--paper-dark);border-radius:4px;font-family:var(--font-body);font-size:0.88rem;color:var(--ink);padding:0.7rem 0.9rem;outline:none;transition:border-color 0.2s;min-height:44px;-webkit-appearance:none;margin-bottom:0.9rem;}
.full-input:focus{border-color:var(--moss-light);}
.weekday-row{display:flex;gap:0.35rem;flex-wrap:wrap;margin-bottom:0.9rem;}
.wd-label{font-size:0.72rem;color:var(--muted);cursor:pointer;background:var(--paper);border:1px solid var(--paper-dark);border-radius:2rem;padding:0.3rem 0.65rem;transition:var(--tr);-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
.wd-label.on{background:var(--amber-pale);border-color:var(--amber);color:var(--amber);}
.full-btn{width:100%;background:var(--rust-light);color:white;border:none;border-radius:4px;padding:0.75rem;font-family:var(--font-body);font-size:0.85rem;cursor:pointer;transition:var(--tr);min-height:44px;-webkit-tap-highlight-color:transparent;}
.full-btn:hover{background:var(--rust);}

.empty{padding:1.5rem 0;text-align:center;color:var(--faint);font-size:0.85rem;font-style:italic;font-family:var(--font-display);}
</style>
</head>
<body>
<nav class="site-nav">
  <span class="nav-brand">The Atlas</span>
  <span class="nav-sep">|</span>
  <a class="nav-link active" href="today.html">Today</a>
  <a class="nav-link" href="atlas.html">Atlas</a>
  <a class="nav-link" href="history.html">History</a>
  <a class="nav-link" href="notes.html">Notes</a>
  <a class="nav-link" href="values.html">Values</a>
  <a class="nav-link" href="selfhelp.html">Self Help</a>
</nav>

<div class="page-wrap">
  <h1 class="page-title">Today's <em>goals.</em></h1>
  <p class="page-sub" id="currentDate"></p>

  <div class="section-tabs">
    <button class="section-tab active" onclick="switchTab('today',this)">Today</button>
    <button class="section-tab" onclick="switchTab('tomorrow',this)">Tomorrow</button>
    <button class="section-tab" onclick="switchTab('regular',this)">Regular Tasks</button>
  </div>

  <!-- TODAY -->
  <div class="section-panel active" id="tab-today">
    <div class="card">
      <div class="card-header"><span class="card-title">Goals for today</span><div class="card-accent moss"></div></div>
      <div class="card-body">
        <div id="todayList"></div>
        <div class="add-row">
          <input class="add-input" id="goalInput" placeholder="Add a goal for today…"/>
          <button class="add-btn" onclick="addGoal()">Add</button>
        </div>
      </div>
    </div>
  </div>

  <!-- TOMORROW -->
  <div class="section-panel" id="tab-tomorrow">
    <div class="card">
      <div class="card-header"><span class="card-title">Plan for tomorrow</span><div class="card-accent amber"></div></div>
      <div class="card-body">
        <div id="tomorrowList"></div>
        <div class="add-row">
          <input class="add-input" id="tomorrowInput" placeholder="Add a goal for tomorrow…"/>
          <button class="add-btn" onclick="addTomorrow()">Add</button>
        </div>
      </div>
    </div>
  </div>

  <!-- REGULAR TASKS -->
  <div class="section-panel" id="tab-regular">
    <div class="card">
      <div class="card-header"><span class="card-title">Regular tasks</span><div class="card-accent rust"></div></div>
      <div class="card-body">
        <div class="task-form-inner">
          <label class="form-label">Task name</label>
          <input class="full-input" id="regInput" placeholder="E.g. Meditate for 10 mins"/>
          <label class="form-label">Repeat on</label>
          <div class="weekday-row" id="wdRow">
            <span class="wd-label" data-v="1">Mon</span>
            <span class="wd-label" data-v="2">Tue</span>
            <span class="wd-label" data-v="3">Wed</span>
            <span class="wd-label" data-v="4">Thu</span>
            <span class="wd-label" data-v="5">Fri</span>
            <span class="wd-label" data-v="6">Sat</span>
            <span class="wd-label" data-v="0">Sun</span>
          </div>
          <button class="full-btn" onclick="addRegular()">Add Regular Task</button>
        </div>
        <div id="regularList"></div>
      </div>
    </div>
  </div>
</div>

<script>
const KEY = 'lt_data';
const WDNAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function loadData() {
  try {
    const d = JSON.parse(localStorage.getItem(KEY)) || {};
    if (!d.goals) d.goals = {};
    if (!d.regularTasks) d.regularTasks = [];
    if (!d.tomorrowGoals) d.tomorrowGoals = [];
    return d;
  } catch { return {goals:{},regularTasks:[],tomorrowGoals:[]}; }
}
function save() { localStorage.setItem(KEY, JSON.stringify(data)); }
let data = loadData();

function getToday() { return new Date().toISOString().split('T')[0]; }
function fmt(ds) { return new Date(ds+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',year:'numeric',month:'long',day:'numeric'}); }

// New-day check: move tomorrow goals to today
(function() {
  const last = localStorage.getItem('lt_lastVisit');
  const today = getToday();
  if (last !== today) {
    if (!data.goals[today]) data.goals[today] = [];
    (data.tomorrowGoals || []).forEach(g => {
      data.goals[today].push({id: Date.now()+Math.random(), text:g.text, status:null, isRegularTask:false, createdAt:new Date().toISOString()});
    });
    data.tomorrowGoals = [];
    save();
    localStorage.setItem('lt_lastVisit', today);
  }
})();

function switchTab(name, btn) {
  document.querySelectorAll('.section-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

// ── TODAY ──
function addGoal() {
  const el = document.getElementById('goalInput');
  const text = el.value.trim(); if (!text) return;
  const today = getToday();
  if (!data.goals[today]) data.goals[today] = [];
  data.goals[today].push({id:Date.now(), text, status:null, isRegularTask:false, createdAt:new Date().toISOString()});
  el.value = ''; save(); renderToday();
}

function setStatus(date, id, status) {
  const g = data.goals[date].find(g => g.id === id);
  if (!g) return;
  g.status = (g.status === status) ? null : status;
  save(); renderToday();
}

function delGoal(date, id) {
  data.goals[date] = data.goals[date].filter(g => g.id !== id);
  save(); renderToday();
}

function handleRegStatus(taskId, status) {
  const today = getToday();
  if (!data.goals[today]) data.goals[today] = [];
  const idx = data.goals[today].findIndex(g => g.regularTaskId === taskId);
  if (idx >= 0) {
    if (data.goals[today][idx].status === status) data.goals[today].splice(idx, 1);
    else data.goals[today][idx].status = status;
  } else {
    const task = data.regularTasks.find(t => t.id === taskId);
    if (task) data.goals[today].push({id:Date.now(), text:task.text, status, isRegularTask:true, regularTaskId:taskId, createdAt:new Date().toISOString()});
  }
  save(); renderToday();
}

function renderToday() {
  const today = getToday();
  const dow = new Date().getDay();
  // Build list: regular tasks for today first, then daily goals
  const regForToday = data.regularTasks.filter(t => t.weekdays.includes(dow));
  const regGoals = regForToday.map(task => {
    const existing = data.goals[today]?.find(g => g.regularTaskId === task.id);
    return existing || {id:'r_'+task.id, text:task.text, status:null, isRegularTask:true, regularTaskId:task.id};
  });
  const dailyGoals = (data.goals[today] || []).filter(g => !g.isRegularTask);
  const all = [...regGoals, ...dailyGoals];

  const el = document.getElementById('todayList');
  if (!all.length) { el.innerHTML = '<div class="empty">No goals yet — add one below.</div>'; return; }
  el.innerHTML = all.map(g => {
    const cls = g.status==='completed' ? 'completed' : g.status==='failed' ? 'failed' : '';
    const dc = g.status==='completed' ? 's-done' : '';
    const fc = g.status==='failed' ? 's-fail' : '';
    const tag = g.isRegularTask ? '<span class="reg-tag">Regular</span>' : '';
    const onD = g.isRegularTask ? `handleRegStatus(${g.regularTaskId},'completed')` : `setStatus('${today}',${g.id},'completed')`;
    const onF = g.isRegularTask ? `handleRegStatus(${g.regularTaskId},'failed')` : `setStatus('${today}',${g.id},'failed')`;
    const del = g.isRegularTask ? '' : `<button class="del-btn" onclick="delGoal('${today}',${g.id})">✕</button>`;
    return `<div class="goal-item ${cls}"><div class="goal-text">${tag}${g.text}</div><div class="status-btns"><button class="status-btn ${dc}" onclick="${onD}">✓</button><button class="status-btn ${fc}" onclick="${onF}">✗</button>${del}</div></div>`;
  }).join('');
}

// ── TOMORROW ──
function addTomorrow() {
  const el = document.getElementById('tomorrowInput');
  const text = el.value.trim(); if (!text) return;
  data.tomorrowGoals.push({id:Date.now(), text, createdAt:new Date().toISOString()});
  el.value = ''; save(); renderTomorrow();
}
function delTomorrow(id) {
  data.tomorrowGoals = data.tomorrowGoals.filter(g => g.id !== id);
  save(); renderTomorrow();
}
function renderTomorrow() {
  const el = document.getElementById('tomorrowList');
  if (!data.tomorrowGoals.length) { el.innerHTML = '<div class="empty">Nothing planned for tomorrow yet.</div>'; return; }
  el.innerHTML = data.tomorrowGoals.map(g =>
    `<div class="goal-item"><div class="goal-text"><span class="tmr-tag">Tomorrow</span>${g.text}</div><div class="status-btns"><button class="del-btn" onclick="delTomorrow(${g.id})">✕</button></div></div>`
  ).join('');
}

// ── REGULAR TASKS ──
// Weekday pill toggles
document.querySelectorAll('.wd-label').forEach(el => {
  el.addEventListener('click', () => el.classList.toggle('on'));
});

function addRegular() {
  const text = document.getElementById('regInput').value.trim();
  if (!text) return;
  const days = Array.from(document.querySelectorAll('.wd-label.on')).map(el => parseInt(el.dataset.v));
  if (!days.length) { alert('Please select at least one day.'); return; }
  data.regularTasks.push({id:Date.now(), text, weekdays:days, createdAt:new Date().toISOString()});
  document.getElementById('regInput').value = '';
  document.querySelectorAll('.wd-label').forEach(el => el.classList.remove('on'));
  save(); renderRegular(); renderToday();
}
function delRegular(id) {
  data.regularTasks = data.regularTasks.filter(t => t.id !== id);
  save(); renderRegular(); renderToday();
}
function renderRegular() {
  const el = document.getElementById('regularList');
  if (!data.regularTasks.length) { el.innerHTML = '<div class="empty">No regular tasks yet.</div>'; return; }
  el.innerHTML = data.regularTasks.map(t =>
    `<div class="goal-item"><div class="goal-text"><span class="reg-tag">${t.weekdays.sort((a,b)=>a-b).map(d=>WDNAMES[d]).join(', ')}</span>${t.text}</div><div class="status-btns"><button class="del-btn" onclick="delRegular(${t.id})">✕</button></div></div>`
  ).join('');
}

// Enter keys
document.getElementById('goalInput').addEventListener('keypress', e => { if(e.key==='Enter') addGoal(); });
document.getElementById('tomorrowInput').addEventListener('keypress', e => { if(e.key==='Enter') addTomorrow(); });
document.getElementById('regInput').addEventListener('keypress', e => { if(e.key==='Enter') addRegular(); });

// Init
document.getElementById('currentDate').textContent = fmt(getToday());
renderToday(); renderTomorrow(); renderRegular();
</script>
</body>
</html>
